<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budżet">
<meta name="theme-color" content="#F2F2F7">
<title>Budżet</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#007AFF;--green:#34C759;--red:#FF3B30;--orange:#FF9500;
  --bg:#F2F2F7;--card:#FFFFFF;--card2:#F9F9FB;
  --label:rgba(0,0,0,1);--label2:rgba(60,60,67,.6);--label3:rgba(60,60,67,.3);--label4:rgba(60,60,67,.18);
  --sep:rgba(60,60,67,.12);--sep2:rgba(60,60,67,.06);
  --nav-bg:rgba(249,249,251,.94);--nav-h:49px;
  --st:0px;--sb:0px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--label);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input{font-family:inherit;}
#app{display:flex;flex-direction:column;height:100%;}
#sb{height:var(--st);background:var(--bg);flex-shrink:0;}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);padding-bottom:calc(var(--nav-h) + var(--sb) + 8px);}
#content::-webkit-scrollbar{display:none;}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(–nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(–sep);display:flex;align-items:flex-start;padding-top:8px;padding-bottom:var(–sb);height:calc(var(–nav-h) + var(–sb));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(–label3);transition:color .15s;}
.ni.on{color:var(–blue);}
.ni svg{width:25px;height:25px;}
.ni span,.na span{font-size:10px;font-weight:500;letter-spacing:-.1px;}
.na{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.na-c{width:30px;height:30px;border-radius:50%;background:var(–blue);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,122,255,.35);transition:transform .12s,opacity .12s;}
.na:active .na-c{transform:scale(.92);opacity:.8;}
.na span{color:var(–blue);}

/* TYPOGRAPHY */
.big-title{font-size:34px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.sm-title{font-size:17px;font-weight:600;letter-spacing:-.2px;}

/* HERO */
.hero{margin:4px 16px 10px;border-radius:16px;padding:20px;color:#fff;position:relative;overflow:hidden;background:var(–blue);}
.hero.green{background:var(–green);}
.hero::before{content:’’;position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08);}
.hero-lbl{font-size:13px;font-weight:500;opacity:.75;margin-bottom:4px;}
.hero-amt{font-size:42px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:16px;}
.hero-row{display:flex;}
.hero-stat{flex:1;}
.hero-stat-lbl{font-size:12px;opacity:.65;font-weight:500;margin-bottom:2px;}
.hero-stat-val{font-size:19px;font-weight:600;letter-spacing:-.5px;}
.hero-div{width:.5px;background:rgba(255,255,255,.25);margin:0 16px;}
.prog-track{height:4px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden;margin-top:12px;}
.prog-fill{height:100%;border-radius:99px;background:rgba(255,255,255,.9);transition:width .6s cubic-bezier(.4,0,.2,1);}

/* GROUP / CARD */
.grp{margin:0 16px 10px;}
.grp-hdr{font-size:12px;font-weight:400;color:var(–label2);padding:0 4px 6px;letter-spacing:.04em;text-transform:uppercase;}
.card{background:var(–card);border-radius:12px;overflow:hidden;}
.row{display:flex;align-items:center;padding:11px 16px;min-height:44px;gap:12px;border-bottom:.5px solid var(–sep);background:var(–card);}
.row:last-child{border-bottom:none;}
.row:active{background:#F5F5F5;}
.row-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* TAG */
.tag{display:inline-flex;align-items:center;padding:5px 11px;border-radius:99px;font-size:13px;font-weight:500;background:rgba(0,122,255,.1);color:var(–blue);transition:opacity .15s;}
.tag:active{opacity:.7;}
.tag.green{background:rgba(52,199,89,.12);color:var(–green);}
.tag.red{background:rgba(255,59,48,.1);color:var(–red);}

/* INSIGHT */
.ins{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-bottom:.5px solid var(–sep);background:var(–card);}
.ins:last-child{border-bottom:none;}
.ins-ico{font-size:24px;flex-shrink:0;}
.ins-ttl{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:2px;}
.ins-txt{font-size:13px;color:var(–label2);line-height:1.4;letter-spacing:-.1px;}

/* SECTION TITLE */
.sec-ttl{font-size:22px;font-weight:700;letter-spacing:-.4px;padding:16px 16px 8px;}

/* MONTH NAV */
.mnav{display:flex;align-items:center;gap:4px;}
.mbtn{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.06);color:var(–blue);font-size:18px;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.mbtn:active{opacity:.6;}
.mbtn:disabled{opacity:.3;pointer-events:none;}
.mlbl{font-size:15px;font-weight:600;color:var(–label);min-width:100px;text-align:center;letter-spacing:-.2px;}

/* ADD SHEET */
#add-sheet{position:fixed;inset:0;z-index:500;pointer-events:none;}
#add-sheet.open{pointer-events:all;}
#add-bd{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .3s;}
#add-sheet.open #add-bd{opacity:1;}
#add-pan{position:absolute;bottom:0;left:0;right:0;background:var(–bg);border-radius:13px 13px 0 0;padding-bottom:calc(var(–sb) + 8px);transform:translateY(100%);transition:transform .42s cubic-bezier(.32,1,.32,1);max-height:92vh;overflow-y:auto;}
#add-sheet.open #add-pan{transform:translateY(0);}
.sh-handle{width:36px;height:5px;border-radius:99px;background:var(–label4);margin:10px auto 0;}
.sh-ttl{font-size:17px;font-weight:600;text-align:center;padding:12px 16px 4px;letter-spacing:-.2px;}
.amt-disp{text-align:center;padding:8px 20px 16px;}
.amt-big{font-size:52px;font-weight:300;letter-spacing:-2px;color:var(–label);line-height:1;}
.amt-big .cur{font-size:28px;font-weight:300;color:var(–label2);}

/* NUMPAD */
#numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(–sep);border-top:.5px solid var(–sep);}
.nk{height:60px;background:var(–card);color:var(–label);font-size:24px;font-weight:300;display:flex;align-items:center;justify-content:center;transition:background .08s;border:none;}
.nk:active{background:#E8E8E8;}
.nk.del{font-size:18px;font-weight:400;}
.nk.ok{background:var(–blue);color:#fff;font-size:17px;font-weight:600;grid-column:span 3;height:52px;}
.nk.ok:active{background:#0066DD;}

/* CAT SCROLL */
.cat-scr{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;}
.cat-scr::-webkit-scrollbar{display:none;}
.cat-p{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:12px;background:var(–card);border:1.5px solid transparent;flex-shrink:0;transition:all .15s;min-width:68px;}
.cat-p.sel{border-color:var(–blue);background:rgba(0,122,255,.07);}
.cat-p-ico{font-size:22px;}
.cat-p-lbl{font-size:11px;font-weight:500;color:var(–label2);white-space:nowrap;}
.cat-p.sel .cat-p-lbl{color:var(–blue);}
.note-row{display:flex;align-items:center;gap:10px;padding:0 16px 12px;}
.note-inp{flex:1;background:var(–card);border:none;outline:none;border-radius:10px;padding:11px 14px;font-size:15px;color:var(–label);}
.note-inp::placeholder{color:var(–label3);}

/* SCAN */
#scan-ov{position:fixed;inset:0;z-index:600;background:#000;display:none;flex-direction:column;}
#scan-ov.show{display:flex;}
#scan-vid{flex:1;width:100%;object-fit:cover;}
.scan-fw{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.scan-fr{width:280px;height:180px;border-radius:14px;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.5);position:relative;overflow:hidden;}
.scan-ln{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(–blue),transparent);animation:scanM 2s ease-in-out infinite;}
@keyframes scanM{0%{top:8px;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:calc(100% - 8px);opacity:0}}
.scan-hint{color:#fff;font-size:14px;margin-top:20px;opacity:.75;font-weight:500;}
.scan-acts{position:absolute;bottom:0;left:0;right:0;padding:20px;padding-bottom:calc(20px + var(–sb));display:flex;gap:12px;background:linear-gradient(transparent,rgba(0,0,0,.6));}
.scan-btn{flex:1;padding:15px;border-radius:14px;font-size:15px;font-weight:600;font-family:inherit;border:none;cursor:pointer;}
.scan-btn.cancel{background:rgba(255,255,255,.18);color:#fff;}
.scan-btn.capture{background:#fff;color:var(–blue);flex:2;}

/* CHART */
.chart-wrap{position:relative;height:180px;}

/* CHAT */
#chat-wrap{display:flex;flex-direction:column;overflow:hidden;}
#chat-msgs{flex:1;overflow-y:auto;padding:8px 16px;-webkit-overflow-scrolling:touch;}
#chat-msgs::-webkit-scrollbar{display:none;}
.msg{display:flex;margin-bottom:8px;}
.msg.user{justify-content:flex-end;}
.bub{max-width:80%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.45;letter-spacing:-.2px;}
.msg.ai .bub{background:var(–card);color:var(–label);border-bottom-left-radius:4px;}
.msg.user .bub{background:var(–blue);color:#fff;border-bottom-right-radius:4px;}
.td{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(–label3);margin:0 2px;animation:tdot 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s;}.td:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
#chat-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:.5px solid var(–sep);background:var(–nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);}
#chat-inp{flex:1;background:rgba(120,120,128,.12);border:none;outline:none;border-radius:20px;padding:9px 14px;font-size:15px;color:var(–label);}
#chat-inp::placeholder{color:var(–label3);}
.chat-send{width:34px;height:34px;border-radius:50%;background:var(–blue);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;}
.chat-send:active{opacity:.7;}
.suggs{display:flex;gap:8px;overflow-x:auto;padding:8px 16px 6px;}
.suggs::-webkit-scrollbar{display:none;}
.sugg{white-space:nowrap;padding:7px 13px;border-radius:99px;background:var(–card);border:.5px solid var(–sep);color:var(–blue);font-size:14px;font-weight:500;flex-shrink:0;font-family:inherit;transition:opacity .15s;}
.sugg:active{opacity:.6;}

/* TOAST */
#toast{position:fixed;top:calc(var(–st) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(50,50,52,.92);backdrop-filter:blur(12px);color:#fff;border-radius:20px;padding:10px 18px;font-size:14px;font-weight:500;z-index:900;white-space:nowrap;transition:transform .35s cubic-bezier(.32,1,.32,1);letter-spacing:-.2px;}
#toast.show{transform:translateX(-50%) translateY(0);}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fadeIn .25s ease forwards;}
</style>

</head>
<body>
<div id="app">
  <div id="sb"></div>
  <div id="content"></div>
  <nav id="nav">
    <button class="ni on" id="ni-home" onclick="showTab('home')">
      <svg viewBox="0 0 25 25" fill="currentColor"><path d="M12.5 3.5L3 11v11h6v-6h7v6h6V11L12.5 3.5z" opacity=".15"/><path fill-rule="evenodd" d="M12.5 2L2 10.5V22a1 1 0 001 1h7v-7h5v7h7a1 1 0 001-1V10.5L12.5 2zm8.5 9.8V21h-5v-7H9v7H4v-9.2l8.5-7.1 8.5 7.1z"/></svg>
      <span>Główna</span>
    </button>
    <button class="ni" id="ni-stats" onclick="showTab('stats')">
      <svg viewBox="0 0 25 25" fill="currentColor"><rect x="3" y="13" width="4.5" height="9" rx="1.5" opacity=".4"/><rect x="10.25" y="8" width="4.5" height="14" rx="1.5" opacity=".4"/><rect x="17.5" y="3" width="4.5" height="19" rx="1.5"/></svg>
      <span>Analiza</span>
    </button>
    <button class="na" onclick="openAdd()">
      <div class="na-c"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></div>
      <span>Dodaj</span>
    </button>
    <button class="ni" id="ni-goals" onclick="showTab('goals')">
      <svg viewBox="0 0 25 25" fill="currentColor"><circle cx="12.5" cy="12.5" r="9.5" opacity=".15"/><circle cx="12.5" cy="12.5" r="5.5" opacity=".3"/><circle cx="12.5" cy="12.5" r="2"/><path d="M12.5 1v3M12.5 21v3M1 12.5h3M21 12.5h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Cele</span>
    </button>
    <button class="ni" id="ni-ai" onclick="showTab('ai')">
      <svg viewBox="0 0 25 25" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12.5 3C7.8 3 4 6.8 4 11.5c0 2.55 1.1 4.85 2.85 6.45L5.5 21l3.1-1.1C9.8 20.6 11.1 21 12.5 21c4.7 0 8.5-3.8 8.5-8.5S17.2 3 12.5 3z"/><path d="M9 10h6.5M9 13.5h4.5"/></svg>
      <span>Coach</span>
    </button>
  </nav>
</div>

<div id="add-sheet">
  <div id="add-bd" onclick="closeAdd()"></div>
  <div id="add-pan">
    <div class="sh-handle"></div>
    <div class="sh-ttl">Nowy wydatek</div>
    <div class="amt-disp"><div class="amt-big"><span id="amt-val">0</span><span class="cur"> zł</span></div></div>
    <div class="note-row">
      <input id="note-inp" class="note-inp" placeholder="Opis (opcjonalnie)…">
      <button onclick="openScan()" style="width:42px;height:42px;border-radius:10px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">📷</button>
    </div>
    <div class="cat-scr" id="cat-scr"></div>
    <div id="numpad"></div>
  </div>
</div>

<div id="scan-ov">
  <video id="scan-vid" autoplay playsinline muted></video>
  <div class="scan-fw"><div class="scan-fr"><div class="scan-ln"></div></div><p class="scan-hint">Skieruj aparat na paragon</p></div>
  <div class="scan-acts">
    <button class="scan-btn cancel" onclick="closeScan()">Anuluj</button>
    <button class="scan-btn capture" onclick="captureReceipt()">📸 Zrób zdjęcie</button>
  </div>
  <canvas id="scan-cv" style="display:none;"></canvas>
</div>

<div id="toast"></div>

<script>
const CATS=[
  {id:'food',label:'Jedzenie',icon:'🍽️',color:'#FF6B35'},
  {id:'cafe',label:'Kawiarnia',icon:'☕',color:'#C67C2E'},
  {id:'transport',label:'Transport',icon:'🚗',color:'#007AFF'},
  {id:'fun',label:'Rozrywka',icon:'🎮',color:'#AF52DE'},
  {id:'shopping',label:'Zakupy',icon:'🛍️',color:'#FF2D55'},
  {id:'housing',label:'Mieszkanie',icon:'🏠',color:'#34C759'},
  {id:'health',label:'Zdrowie',icon:'💊',color:'#FF9500'},
  {id:'sub',label:'Subskrypcje',icon:'📱',color:'#5AC8FA'},
  {id:'sport',label:'Sport',icon:'💪',color:'#30B94D'},
  {id:'travel',label:'Podróże',icon:'✈️',color:'#FF9500'},
  {id:'invest',label:'Oszczędności',icon:'💰',color:'#34C759'},
  {id:'other',label:'Inne',icon:'📦',color:'#8E8E93'},
];
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
let D={expenses:ls('b4_exp',[]),income:ls('b4_inc',0),goals:ls('b4_goals',[]),chat:ls('b4_chat',[]),vm:new Date().toISOString().slice(0,7)};
function save(){lss('b4_exp',D.expenses);lss('b4_inc',D.income);lss('b4_goals',D.goals);lss('b4_chat',D.chat.slice(-40));}
function mk(d=new Date()){return d.toISOString().slice(0,7);}
function mxp(m){return D.expenses.filter(e=>e.monthKey===(m||mk()));}
function cat(id){return CATS.find(c=>c.id===id)||CATS[CATS.length-1];}
function fmt(n){return new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN',maximumFractionDigits:n%1===0?0:2}).format(n);}

let tab='home',charts={};
function showTab(t){
  tab=t;
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('ni-'+t);if(nb)nb.classList.add('on');
  render();
  document.getElementById('content').scrollTop=0;
}
function render(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});charts={};
  const c=document.getElementById('content');
  c.innerHTML=tab==='home'?rHome():tab==='stats'?rStats():tab==='goals'?rGoals():tab==='ai'?rAI():'';
  if(tab==='stats')setTimeout(initCharts,50);
  if(tab==='ai')setTimeout(scrollChat,50);
}

// HOME
function rHome(){
  const m=D.vm,exps=mxp(m),total=exps.reduce((s,e)=>s+e.amount,0);
  const saved=D.income>0?D.income-total:null,pct=D.income>0?Math.min(total/D.income,1):0;
  const isCur=m===mk();
  const vd=new Date(m+'-01');
  const mn=vd.toLocaleDateString('pl-PL',{month:'long',year:'numeric'});
  const recent=[...exps].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const ins=buildIns(exps,total);
  return `<div class="fi">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px;">
    <div class="mnav">
      <button class="mbtn" onclick="chM(-1)">‹</button>
      <span class="mlbl">${mn}</span>
      <button class="mbtn" onclick="chM(1)" ${isCur?'disabled':''}>›</button>
    </div>
    <button onclick="editInc()" class="tag">${D.income>0?fmt(D.income)+'/mies.':'+ Ustaw dochód'}</button>
  </div>
  <div class="hero">
    <div class="hero-lbl">WYDANO W TYM MIESIĄCU</div>
    <div class="hero-amt">${fmt(total)}</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-lbl">OSZCZĘDNOŚCI</div><div class="hero-stat-val">${saved!==null?fmt(saved):'—'}</div></div>
      <div class="hero-div"></div>
      <div class="hero-stat"><div class="hero-stat-lbl">DZIENNA ŚRED.</div><div class="hero-stat-val">${fmt(total/Math.max(new Date().getDate(),1))}</div></div>
    </div>
    ${D.income>0?`<div class="prog-track"><div class="prog-fill" style="width:${pct*100}%;"></div></div>`:''}
  </div>
  ${ins.length?`<div class="sec-ttl">Spostrzeżenia</div><div class="grp"><div class="card">${ins.map(i=>`<div class="ins"><div class="ins-ico">${i.icon}</div><div><div class="ins-ttl">${i.title}</div><div class="ins-txt">${i.text}</div></div></div>`).join('')}</div></div>`:''}
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 4px;">
    <div style="font-size:22px;font-weight:700;letter-spacing:-.4px;">Ostatnie wydatki</div>
    ${exps.length>6?`<button onclick="showTab('stats')" class="tag">Wszystkie (${exps.length})</button>`:''}
  </div>
  ${recent.length===0?`<div style="text-align:center;padding:48px 20px;color:var(--label3);"><div style="font-size:44px;margin-bottom:10px;">🌱</div><div style="font-size:15px;font-weight:500;">Brak wydatków</div><div style="font-size:13px;margin-top:4px;">Dotknij + żeby dodać pierwszy</div></div>`:`<div class="grp"><div class="card">${recent.map(eRow).join('')}</div></div>`}
  </div>`;
}
function eRow(e){
  const c=cat(e.category),d=new Date(e.date);
  return `<div class="row" onclick="delExp('${e.id}','${(e.note||c.label).replace(/'/g,'&apos;')}',${e.amount})">

function buildIns(exps,total){
  if(total===0)return[];
  const ins=[],bycat={};
  exps.forEach(e=>{bycat[e.category]=(bycat[e.category]||0)+e.amount;});
  const top=Object.entries(bycat).sort((a,b)=>b[1]-a[1])[0];
  if(top){const c=cat(top[0]);ins.push({icon:c.icon,title:`Największy wydatek: ${c.label}`,text:`${fmt(top[1])} — ${((top[1]/total)*100).toFixed(0)}% wszystkich wydatków`});}
  const imp=['fun','shopping','cafe'].reduce((s,id)=>s+(bycat[id]||0),0);
  if(imp>0)ins.push({icon:'⚡',title:'Wydatki impulsywne',text:`Rozrywka, zakupy, kawiarnie: ${fmt(imp)} (${((imp/total)*100).toFixed(0)}% budżetu)`});
  if(D.income>0){const sv=D.income-total;ins.push({icon:sv>=0?'✅':'🚨',title:sv>=0?'Oszczędzasz':'Przekroczony budżet',text:sv>=0?`Zostało ${fmt(sv)} — stopa oszczędności ${((sv/D.income)*100).toFixed(0)}%`:`Wydałeś o ${fmt(-sv)} za dużo`});}
  return ins.slice(0,3);
}

async function sendChat(){
  const inp=document.getElementById('chat-inp');
  const text=inp?inp.value.trim():'';if(!text)return;if(inp)inp.value='';
  D.chat.push({r:'user',t:text});save();aMsg('user',text);
  const tid='t'+Date.now();
  const cm=document.getElementById('chat-msgs');
  if(cm){cm.insertAdjacentHTML('beforeend',`<div class="msg ai" id="${tid}"><div class="bub"><span class="td"></span><span class="td"></span><span class="td"></span></div></div>`);document.getElementById('ce')?.scrollIntoView({behavior:'smooth'});}
  const exps=mxp(mk()),total=exps.reduce((s,e)=>s+e.amount,0),bycat={};
  exps.forEach(e=>{bycat[e.category]=(bycat[e.category]||0)+e.amount;});
  const cs=Object.entries(bycat).map(([id,a])=>`${cat(id).label}: ${fmt(a)}`).join(', ')||'brak';
  const ctx=`Dochód: ${D.income>0?fmt(D.income)+'/mies.':'nieokreślony'}. Wydatki ${new Date().toLocaleDateString('pl-PL',{month:'long'})}: ${fmt(total)}. Oszczędności: ${D.income>0?fmt(D.income-total):'?'}. Kategorie: ${cs}. Cele: ${D.goals.map(g=>`${g.name}(${fmt(g.saved)}/${fmt(g.target)})`).join(',')||'brak'}.`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:`Jesteś osobistym coachem finansowym. Użytkownik zarabia dobrze ale nie oszczędza. Mówisz po polsku, bezpośrednio, używasz liczb. Maks 3-4 zdania chyba że plan. Dane: ${ctx}`,messages:D.chat.map(m=>({role:m.r==='user'?'user':'assistant',content:m.t}))})});
    const data=await resp.json();const reply=data.content?.[0]?.text||'Przepraszam, coś poszło nie tak.';
    document.getElementById(tid)?.remove();D.chat.push({r:'ai',t:reply});save();aMsg('ai',reply);
  }catch{document.getElementById(tid)?.remove();aMsg('ai','Błąd połączenia. Sprawdź internet.');}
}

async function openScan(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});document.getElementById('scan-vid').srcObject=stream;document.getElementById('scan-ov').classList.add('show');}catch{toast('Brak dostępu do aparatu');}}
function closeScan(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}document.getElementById('scan-ov').classList.remove('show');}
async function captureReceipt(){const v=document.getElementById('scan-vid'),c=document.getElementById('scan-cv');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);const b64=c.toDataURL('image/jpeg',.75).split(',')[1];closeScan();toast('Analizuję paragon…');try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:'Odpowiadaj TYLKO w JSON. Analizuj paragon. Zwróć: {"amount":liczba,"category":"food|cafe|transport|fun|shopping|housing|health|sub|sport|travel|invest|other","note":"max 3 słowa"}. Jeśli brak paragonu: {"error":"brak paragonu"}.',messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:'Przeanalizuj paragon.'}]}]})});const data=await resp.json();let txt=(data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();const res=JSON.parse(txt);if(res.error){toast(res.error);return;}if(res.amount>0){aS.amount=String(res.amount);if(res.category)aS.category=res.category;if(res.note){const ni=document.getElementById('note-inp');if(ni)ni.value=res.note;}uAmt();bCats();toast(`Wykryto: ${fmt(res.amount)}`);}else toast('Nie wykryto kwoty');}catch{toast('Błąd analizy');}}

// TOAST
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}
