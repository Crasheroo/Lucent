<!DOCTYPE html>
        <div>
          <span>Pozostało</span>
          <strong id="remaining">3200 zł</strong>
        </div>

        <div>
          <span>Wydane</span>
          <strong id="spent">0 zł</strong>
        </div>
      </div>
    </section>


    <section class="coach-card glass">
      <p class="coach-title">AI Coach</p>
      <h3 id="coachMessage">
        Zacznij dodawać wydatki, a pokażę Ci gdzie uciekają pieniądze.
      </h3>
    </section>


    <section class="section-title">
      <h2>Dzisiejsze wydatki</h2>
    </section>


    <section id="expenseList" class="expense-list">
    </section>


    <button class="fab" id="openModal">
      +
    </button>


    <div class="modal hidden" id="modal">
      <div class="modal-content glass">

        <div class="modal-header">
          <h2>Dodaj wydatek</h2>
          <button id="closeModal">✕</button>
        </div>

        <form id="expenseForm">

          <input
            type="number"
            id="amount"
            placeholder="Kwota"
            required
          />

          <input
            type="text"
            id="title"
            placeholder="Opis"
            required
          />

          <select id="category">
            <option>Jedzenie</option>
            <option>Transport</option>
            <option>Zakupy</option>
            <option>Subskrypcje</option>
            <option>Rozrywka</option>
            <option>Inne</option>
          </select>

          <button type="submit" class="save-btn">
            Zapisz wydatek
          </button>

        </form>
      </div>
    </div>

  </div>

<script src="app.js"></script>
</body>
</html>
