<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />

    <!-- SEO / Social -->
    <meta name="description" content="Śledź wydatki, cele oszczędnościowe i stałe płatności. Twój osobisty asystent finansowy." />
    <meta name="application-name" content="Lucent" />
    <meta property="og:title" content="Lucent — Finanse osobiste" />
    <meta property="og:description" content="Śledź wydatki, cele oszczędnościowe i stałe płatności." />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Lucent</title>

    <script>
      // GitHub Pages SPA fix — przywróć ścieżkę po przekierowaniu z 404.html
      (function() {
        var redirect = new URLSearchParams(window.location.search).get('redirect');
        if (redirect) {
          var repo = '/Lucent';
          window.history.replaceState(null, null, repo + redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
