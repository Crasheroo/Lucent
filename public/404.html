<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA fix — przekieruj wszystkie 404 do index.html
      // zachowując ścieżkę jako parametr
      var repo = '/lucent';
      var path = window.location.pathname.replace(repo, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        repo + '/?redirect=' + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
